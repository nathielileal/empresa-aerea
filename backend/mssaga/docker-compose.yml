version: "3.8"

services:
  mscliente:
    build: .
    container_name: mssaga
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    networks:
      - ms-network


networks:
  ms-network:
    external: true
