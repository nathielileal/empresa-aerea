version: '3.8'

services:
  msvoo-db:
    image: postgres:15
    container_name: msvoo-db
    environment:
      POSTGRES_DB: msvoo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '@123Mudar'
    ports:
      - "5432:5432"
    networks:
      - ms-network
    volumes:
      - msvoo-db-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"  
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ms-network

  voo:
    build:
      context: .
    container_name: voo
    depends_on:
      - msvoo-db
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://msvoo-db:5432/msvoo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: '@123Mudar'
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "9091:9091"
    networks:
      - ms-network

networks:
  ms-network:
    driver: bridge

volumes:
  msvoo-db-data:
