version: '3.9'
services:
  auth-service:
    build: .
    ports:
      - "8083:8083"
    depends_on:
      - mongo
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    networks:
      - ms-network

  mongo:
    image: mongo
    container_name: auth-mongo
    ports:
      - "27017:27017"
    networks:
      - ms-network
networks:
  ms-network:
    external: true