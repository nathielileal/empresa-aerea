version: '3.9'
services:
  auth-service:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      - rabbitmq.queue.cadastro-iniciado=cliente.cadastro.iniciado

  mongo:
    image: mongo
    container_name: auth-mongo
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest