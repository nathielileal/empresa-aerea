version: '3.9'
services:
  auth-service:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - rabbitmq.queue.cadastro-iniciado=cliente.cadastro.iniciado
    networks:
      - ms-network

  mongo:
    image: mongo
    container_name: auth-mongo
    ports:
      - "27017:27017"
    networks:
      - ms-network
networks:
  ms-network:
    external: true
